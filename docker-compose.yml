services:
  postgres:
    image: postgres:16.13-alpine
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - .:/contract:ro

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.13.31
    ports:
      - "${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT is required}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:?CLICKHOUSE_NATIVE_PORT is required}:9000"
    environment:
      CLICKHOUSE_DB: "${CLICKHOUSE_DATABASE:?CLICKHOUSE_DATABASE is required}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - .:/contract:ro

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - redis-data:/data
      - .:/contract:ro

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
